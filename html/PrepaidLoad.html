<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prepaid Load</title>
    <link rel="stylesheet" href="../css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <div class="card">
            <div class="card-header d-flex flex-column justify-content-center align-items-center">
                <h4>Prepaid Load</h4>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label for="telcoProvider" class="form-label">TelCo Provider:</label>
                    <select id="telcoProvider" class="form-select">
                        <option value="">Select Provider</option>
                        <option value="smart">Smart</option>
                        <option value="globe">Globe</option>
                        <option value="dito">Dito</option>
                        <option value="tnt">TNT</option>
                        <option value="tm">TM</option>
                        <option value="gomo">GOMO</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Load Amount:</label>
                    <div id="loadOptions"></div>
                    <input type="number" id="otherAmount" class="form-control mt-2" placeholder="Enter custom amount" disabled>
                </div>

                <div class="mb-3">
                    <label for="totalAmount" class="form-label">Total Amount:</label>
                    <input type="text" id="totalAmount" class="form-control" readonly>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/jquery-4.0.0.min.js"></script>
    <script src="../js/bootstrap.bundle.min.js"></script>
    <script src="../js/my_scripts/PrepaidLoad.js"></script>
</body>
</html>
