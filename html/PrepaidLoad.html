<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prepaid Load</title>
    <link rel="stylesheet" href="../css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <div class="card">
            <div class="card-header d-flex flex-column justify-content-center align-items-center">
                <h4>Prepaid Load</h4>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label for="telcoProvider" class="form-label">TelCo Provider:</label>
                    <select id="telcoProvider" class="form-select">
                        <option value="">Select Provider</option>
                        <option value="smart">Smart</option>
                        <option value="globe">Globe</option>
                        <option value="dito">Dito</option>
                        <option value="tnt">TNT</option>
                        <option value="tm">TM</option>
                        <option value="gomo">GOMO</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Load Type:</label>
                    <ul class="nav nav-tabs mb-3" id="loadTypeTabs" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active" id="loadAmount-tab" data-bs-toggle="tab" data-bs-target="#loadAmount-pane" type="button" role="tab" aria-controls="loadAmount-pane" aria-selected="true">Load Amount</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="data-tab" data-bs-toggle="tab" data-bs-target="#data-pane" type="button" role="tab" aria-controls="data-pane" aria-selected="false">Data</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="dataUnli-tab" data-bs-toggle="tab" data-bs-target="#dataUnli-pane" type="button" role="tab" aria-controls="dataUnli-pane" aria-selected="false">Data + Unli Call & Text</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="unliDataUnli-tab" data-bs-toggle="tab" data-bs-target="#unliDataUnli-pane" type="button" role="tab" aria-controls="unliDataUnli-pane" aria-selected="false">Unli Data + Unli Call & Text</button>
                        </li>
                    </ul>
                    <div class="tab-content" id="loadTypeTabContent">
                        <div class="tab-pane fade show active" id="loadAmount-pane" role="tabpanel" aria-labelledby="loadAmount-tab">
                            <div id="loadOptions"></div>
                            <input type="number" id="otherAmount" class="form-control mt-2" placeholder="Enter custom amount" disabled style="display:none;">
                        </div>
                        <div class="tab-pane fade" id="data-pane" role="tabpanel" aria-labelledby="data-tab">
                            <div id="dataOptions"></div>
                        </div>
                        <div class="tab-pane fade" id="dataUnli-pane" role="tabpanel" aria-labelledby="dataUnli-tab">
                            <div id="dataUnliOptions"></div>
                        </div>
                        <div class="tab-pane fade" id="unliDataUnli-pane" role="tabpanel" aria-labelledby="unliDataUnli-tab">
                            <div id="unliDataUnliOptions"></div>
                        </div>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="totalAmount" class="form-label">Total Amount:</label>
                    <input type="text" id="totalAmount" class="form-control" readonly>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/jquery-4.0.0.min.js"></script>
    <script src="../js/bootstrap.bundle.min.js"></script>
    <script src="../js/my_scripts/PrepaidLoad.js"></script>
</body>
</html>
